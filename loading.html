<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: black;
        }

        .container {
            width: 220px;
            height: 220px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .cubinhos {
            width: 100px;
            height: 100px;
            background: rgb(66, 66, 66);
            animation: circle calc(4 * 0.2s) linear infinite;
        }

        .cubinhos:nth-child(1) {
            animation-delay: 0s;
        }

        .cubinhos:nth-child(2) {
            animation-delay: 0.2s;
        }

        .cubinhos:nth-child(4) {
            animation-delay: calc(2 * 0.2s);
        }

         .cubinhos:nth-child(3) {
            animation-delay: calc(3 * 0.2s);
        }

        @keyframes circle {
            0%, 25% {background: #125f9e;}
            50%, 100% {background: rgb(66, 66, 66);}
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div class="cubinhos"></div>
        <div class="cubinhos"></div>
        <div class="cubinhos"></div>
        <div class="cubinhos"></div>
    </div>
</body>
</html>
