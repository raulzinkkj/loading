<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap');
    </style>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
             font-family: "Montserrat", sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 30px;
        }

        .card {
            height: 200px;
            border: solid 1px black;
            border-radius: 10px;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            justify-content: space-between;
            align-items: center;
            gap: 40px;
        }

        .resumo {
            display: flex;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        .exemplo {
            height: 100%;
           background: black;
           display: flex;
           justify-content: center;
           align-items: center;
           border-radius: 10px;
           color: white;
        }

        .azul {
            color: #00ccff;
        }
        
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="resumo">
                <h1>SELECT</h1>
                <p>
                    O SELECT é um comando do SQL usado para consultar e recuperar dados de uma tabela em um banco de
                    dados. Ele permite escolher quais colunas você quer ver e, se quiser, filtrar os resultados.
                </p>
            </div>
            <div class="exemplo">
                <span><span class="azul">SELECT * FROM </span>clientes</span>
            </div>
        </div>
    </div>
</body>

</html>
