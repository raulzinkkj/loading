<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .card {
            width: 200px;
            height: 200px;
            border: solid 2px black;
            border-radius: 5px 100px;
            background: linear-gradient(to right, #d0ff00, #f0fa90);
        }

        .folha {
             width: 50px;
            height: 50px;
            border: solid 2px black;
            border-radius: 5px 100px;
            background: linear-gradient(to right, #02ff0e, #6ac731);
        }
    </style>
</head>
<body>
    <div class="limao">
    <div class="folha"></div>
    <div class="card"></div>
</div>
</body>
</html>
